<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóveis - Imóveis com Leandro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="imoveis-page">
    <header>
        <nav>
            <div class="logo">
                <span class="logo-text">LB</span>
                <span class="logo-full">Leandro Bomfim</span>
            </div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="imoveis.html" class="active">Imóveis</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="filters fade-in">
            <h2 class="fade-in">Filtrar Imóveis</h2>
            <div class="filter-container">
                <div class="filter-group fade-in delay-1">
                    <label for="bairro">Bairro:</label>
                    <select id="bairro">
                        <option value="">Todos</option>
                        <option value="Centro">Centro</option>
                        <option value="Jardins">Jardins</option>
                        <option value="Vila Nova">Vila Nova</option>
                    </select>
                </div>
                <div class="filter-group fade-in delay-2">
                    <label for="quartos">Número de Quartos:</label>
                    <select id="quartos">
                        <option value="">Todos</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="filter-group fade-in delay-3">
                    <label for="preco">Faixa de Preço (R$):</label>
                    <select id="preco">
                        <option value="">Todos</option>
                        <option value="0-300000">Até 300.000</option>
                        <option value="300001-500000">300.001 - 500.000</option>
                        <option value="500001+">Acima de 500.000</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="gallery" id="gallery">
            <!-- Galeria será populada pelo JS -->
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Imóveis com Leandro. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
