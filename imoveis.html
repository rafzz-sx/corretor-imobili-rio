<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imóveis - Leandro Bomfim</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="imoveis-page">
    <header>
        <nav>
            <div class="logo">
                <span class="logo-text">LB</span>
                <span class="logo-full">Leandro Bomfim</span>
            </div>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="imoveis.html" class="active">Imóveis</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
            <div class="menu-toggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </nav>
    </header>

    <main>
        <section class="filters fade-in">
            <h2>Filtrar Imóveis</h2>
            <div class="filter-container">
                <div class="filter-group fade-in delay-1">
                    <label for="bairro">Bairro:</label>
                    <select id="bairro">
                        <option value="">Todos</option>
                        <option value="Ipanema">Ipanema</option>
                        <option value="Leblon">Leblon</option>
                        <option value="Barra da Tijuca">Barra da Tijuca</option>
                        <option value="Barra Olímpica">Barra Olímpica</option>
                        <option value="Recreio dos Bandeirantes">Recreio dos Bandeirantes</option>
                    </select>
                </div>
                <div class="filter-group fade-in delay-2">
                    <label for="quartos">Número de Quartos:</label>
                    <select id="quartos">
                        <option value="">Todos</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                    </select>
                </div>
                <div class="filter-group fade-in delay-3">
                    <label for="preco">Faixa de Preço (R$):</label>
                    <select id="preco">
                        <option value="">Todos</option>
                        <option value="0-600000">Até 600.000</option>
                        <option value="600001-1000000">600.001 - 1.000.000</option>
                        <option value="1000001+">Acima de 1.000.000</option>
                    </select>
                </div>
            </div>
        </section>

        <section class="gallery" id="gallery">
            <!-- Galeria populada pelo JS -->
        </section>
    </main>

    <!-- MODAL SAIBA MAIS -->
    <div class="modal-overlay" id="imovel-modal">
        <div class="modal-container">
            <button class="modal-close" onclick="closeModal()">
                <i class="fas fa-times"></i>
            </button>

            <div class="modal-gallery">
                <div class="modal-main-photo-wrap">
                    <img id="modal-main-photo" src="" alt="Foto principal do imóvel">
                    <button class="modal-nav modal-prev" onclick="prevPhoto()">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button class="modal-nav modal-next" onclick="nextPhoto()">
                        <i class="fas fa-chevron-right"></i>
                    </button>
                    <div class="modal-photo-counter" id="modal-photo-counter">1 / 4</div>
                </div>
                <div class="modal-thumbs" id="modal-thumbs"></div>
            </div>

            <div class="modal-info">
                <h2 id="modal-title"></h2>
                <div class="modal-tags">
                    <span class="modal-tag"><i class="fas fa-map-marker-alt"></i> <span id="modal-bairro"></span></span>
                    <span class="modal-tag"><i class="fas fa-bed"></i> <span id="modal-quartos"></span> quartos</span>
                    <span class="modal-tag"><i class="fas fa-ruler-combined"></i> <span id="modal-area"></span></span>
                </div>
                <p class="modal-preco" id="modal-preco"></p>
                <p class="modal-descricao" id="modal-descricao"></p>
                <div class="modal-cta-group">
                    <a href="https://wa.me/5521981424469" class="modal-cta">
                        <i class="fab fa-whatsapp"></i>
                        <span>Tenho Interesse</span>
                    </a>
                    <a href="contato.html" class="modal-cta modal-cta-contato">
                        <i class="fas fa-address-card"></i>
                        <span>Ver Contatos</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Leandro Imóveis. Todos os direitos reservados.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
